name: AutoPR (dogfood)
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  autopr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          openai_key: ${{ secrets.OPENAI_KEY }}
          # license_key: ${{ secrets.AUTOPR_LICENSE_KEY }}  # Required for private repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
